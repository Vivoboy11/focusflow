name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout Code
        uses: actions/checkout@v4

      # ── 2. Python 3.12 ────────────────────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ── 3. Java 17 ────────────────────────────────────────────────────────
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 4. Install latest Flet ────────────────────────────────────────────
      - name: Install Flet
        run: |
          python -m pip install --upgrade pip
          pip install flet

      # ── 5. Install app dependencies ───────────────────────────────────────
      - name: Install App Dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      # ── 6. Build APK ──────────────────────────────────────────────────────
      #   FLET_CLI_NO_RICH_OUTPUT=1  → disables the Rich console renderer that
      #                                uses Python-2-only `unicode` type calls
      #   --skip-flutter-doctor      → skips flutter doctor output parsing
      #                                entirely (added in Flet 0.25+)
      - name: Build APK
        env:
          FLET_CLI_NO_RICH_OUTPUT: "1"
        run: flet build apk --skip-flutter-doctor --verbose

      # ── 7. Verify APK ─────────────────────────────────────────────────────
      - name: Verify APK exists
        run: |
          find build/apk -name "*.apk" | tee /tmp/apk_list.txt
          if [ ! -s /tmp/apk_list.txt ]; then
            echo "ERROR: No APK found!" && exit 1
          fi

      # ── 8. Upload APK ─────────────────────────────────────────────────────
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FocusFlow-Mobile-App
          path: build/apk/*.apk
          retention-days: 30
          if-no-files-found: error
