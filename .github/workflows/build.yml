name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - name: Accept Android Licenses
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet==0.80.3 flet-cli==0.80.3

      - name: Patch Flet bugs globally via sitecustomize.py
        run: |
          SITE=$(python -c "import site; print(site.getsitepackages()[0])")

          printf '%s\n' \
            "import builtins, io, os" \
            "" \
            "# Fix 1: Restore Python 2 unicode() built-in" \
            "def legacy_unicode(data='', encoding='utf-8', errors='strict'):" \
            "    if encoding is None: encoding = 'utf-8'" \
            "    if isinstance(data, bytes): return data.decode(encoding, errors)" \
            "    return str(data)" \
            "builtins.unicode = legacy_unicode" \
            "" \
            "# Fix 2: Patch open() so binary files are never decoded as UTF-8" \
            "_real_open = builtins.open" \
            "def _safe_open(file, mode='r', buffering=-1, encoding=None, errors=None, **kw):" \
            "    if 'b' not in mode and encoding is None and errors is None:" \
            "        errors = 'replace'" \
            "    return _real_open(file, mode, buffering, encoding=encoding, errors=errors, **kw)" \
            "builtins.open = _safe_open" \
            > "$SITE/sitecustomize.py"

          echo "--- sitecustomize.py written to $SITE ---"
          cat "$SITE/sitecustomize.py"

      - name: Build APK
        env:
          _JAVA_OPTIONS: "-Xmx3200m"
          PYTHONUTF8: "1"
        run: flet build apk --yes --verbose

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FocusFlow-Mobile-App
          path: build/apk/*.apk
          retention-days: 30
          if-no-files-found: error
