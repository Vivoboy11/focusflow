name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Install Java 17 (Required for Android app compilation)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 2. Officially install the Flutter Engine so Flet doesn't have to
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 3. Automatically sign and accept all of Google's Android Developer Licenses
      - name: Accept Android Licenses
        run: yes | flutter doctor --android-licenses || true

      # 4. Set up Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 5. Install Flet
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet

      # 6. Build the APK (Notice we removed the 'yes |' hack!)
      - name: Build APK
        run: flet build apk

      # 7. Upload the final App file
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FocusFlow-Mobile-App
          path: build/apk/*.apk