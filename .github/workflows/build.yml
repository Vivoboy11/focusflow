name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04 # Downgraded to 22.04 as it is significantly more stable for Android compiling

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Accept Android Licenses
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # THE ULTIMATE FIX: Inject 'unicode' directly into Python's brain to bypass the crash!
      - name: Patch Python Unicode Bug Globally
        run: |
          echo "import builtins; builtins.unicode = str" > sitecustomize.py
          echo "PYTHONPATH=$PWD" >> $GITHUB_ENV

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet

      # PREEMPTIVE FIX: Limit Gradle memory to prevent the server from crashing during compiling
      - name: Build APK
        env:
          _JAVA_OPTIONS: "-Xmx3200m"
        run: flet build apk --skip-flutter-doctor --no-rich-output --yes

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FocusFlow-Mobile-App
          path: build/apk/*.apk
          retention-days: 30
          if-no-files-found: error
