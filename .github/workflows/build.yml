name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # ADDED BACK: Setup Flutter officially so Flet doesn't crash trying to download it
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # ADDED BACK: Accept Google's Android SDK licenses to prevent permission blocks
      - name: Accept Android Licenses
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Your excellent printf patch logic (using standard spaces for Python indents)
      - name: Patch Python unicode bug globally
        run: |
          printf '%s\n' \
            "import builtins" \
            "def legacy_unicode(data='', encoding='utf-8', errors='strict'):" \
            "    if encoding is None:" \
            "        encoding = 'utf-8'" \
            "    if isinstance(data, bytes):" \
            "        return data.decode(encoding, errors)" \
            "    return str(data)" \
            "builtins.unicode = legacy_unicode" \
            > sitecustomize.py
          echo "PYTHONPATH=$PWD" >> $GITHUB_ENV
          echo "--- sitecustomize.py written ---"
          cat sitecustomize.py

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet==0.80.3 flet-cli==0.80.3

      - name: Build APK
        env:
          _JAVA_OPTIONS: "-Xmx3200m"
        run: flet build apk --yes --verbose

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FocusFlow-Mobile-App
          path: build/apk/*.apk
          retention-days: 30
          if-no-files-found: error
