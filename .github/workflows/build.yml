name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  FLET_CLI_VERSION: "0.81.0"
  BUILD_NUMBER: 1
  BUILD_VERSION: 1.0.0
  PYTHONUTF8: "1"
  FLET_CLI_NO_RICH_OUTPUT: "1"
  FLET_CLI_SKIP_FLUTTER_DOCTOR: "1"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install flet-cli
        run: |
          python -m pip install --upgrade pip
          pip install flet-cli==${{ env.FLET_CLI_VERSION }}

      - name: Patch unicode bug in flet-cli
        run: |
          SITE=$(python -c "import site; print(site.getsitepackages()[0])")
          echo "Patching $SITE..."

          # Fix 1: unicode(x) with no encoding -> str(x)
          grep -rl --include="*.py" "unicode(" "$SITE" 2>/dev/null | while read f; do
            echo "  -> $f"
            # unicode(x, enc) -> x.decode(enc) if enc else str(x)
            sed -i \
              -e 's/unicode(\([^,)]*\), *\([^)]*\))/(\1).decode(\2) if isinstance(\1, bytes) else str(\1)/g' \
              -e 's/unicode(\([^)]*\))/str(\1)/g' \
              "$f"
          done

          echo "Patch done."
          # Verify no unicode( calls remain
          COUNT=$(grep -rl --include="*.py" "unicode(" "$SITE" 2>/dev/null | wc -l)
          echo "Remaining files with unicode(): $COUNT"

      - name: Accept Android licenses
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install App Dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Create pyproject.toml
        run: |
          if [ ! -f pyproject.toml ]; then
            printf '[project]\nname = "focusflow"\nversion = "%s"\ndescription = "FocusFlow Mobile App"\ndependencies = ["flet"]\n\n[tool.flet]\norg = "com.focusflow"\nproduct = "FocusFlow"\n' "${{ env.BUILD_VERSION }}" > pyproject.toml
          fi

      - name: Build APK
        run: |
          flet build apk \
            --build-number ${{ env.BUILD_NUMBER }} \
            --build-version ${{ env.BUILD_VERSION }} \
            --yes \
            --verbose

      - name: Verify APK exists
        run: |
          find build/apk -name "*.apk" | tee /tmp/apk_list.txt
          if [ ! -s /tmp/apk_list.txt ]; then
            echo "ERROR: No APK found!" && exit 1
          fi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FocusFlow-Mobile-App
          path: build/apk/*.apk
          retention-days: 30
          if-no-files-found: error
