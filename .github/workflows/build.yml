name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout source code ───────────────────────────────────────────
      - name: Checkout Code
        uses: actions/checkout@v4

      # ── 2. Python 3.12 (required by Flet 0.25+ mobile runtime) ───────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ── 3. Java 21 (required by Android SDK / Gradle) ─────────────────────
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # ── 4. Flutter (pinned stable, known to work with Flet 0.28.x) ────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'
          channel: 'stable'
          cache: true

      # ── 5. Disable Flutter analytics (avoids interactive prompts) ─────────
      - name: Disable Flutter Analytics
        run: flutter config --no-analytics

      # ── 6. Cache Pub & Gradle ─────────────────────────────────────────────
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-deps-${{ hashFiles('**/pubspec.lock', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-deps-

      # ── 7. Install Flet CLI (latest stable) ───────────────────────────────
      - name: Install Flet
        run: |
          python -m pip install --upgrade pip
          pip install flet==0.28.3

      # ── 8. Install app dependencies (if requirements.txt exists) ──────────
      - name: Install App Dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      # ── 9. Build the APK ──────────────────────────────────────────────────
      #       Flet internally generates a Flutter project, runs pub get,
      #       and compiles — no manual flutter pub get needed.
      - name: Build APK
        run: flet build apk --verbose

      # ── 10. Verify APK exists ─────────────────────────────────────────────
      - name: Verify APK exists
        run: |
          echo "── Listing build/apk ──"
          find build/apk -name "*.apk" | tee /tmp/apk_list.txt
          if [ ! -s /tmp/apk_list.txt ]; then
            echo "ERROR: No APK found under build/apk!" && exit 1
          fi

      # ── 11. Upload APK as downloadable artifact ───────────────────────────
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FocusFlow-Mobile-App
          path: build/apk/*.apk
          retention-days: 30
          if-no-files-found: error
