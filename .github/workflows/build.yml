name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  FLUTTER_VERSION: '3.29.2'
  PYTHON_VERSION: '3.12.2'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout Code
        uses: actions/checkout@v4

      # ── 2. Python 3.12 ────────────────────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # ── 3. Java 21 ────────────────────────────────────────────────────────
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # ── 4. Flutter (must be installed BEFORE flet) ────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      # ── 5. Disable Flutter analytics ──────────────────────────────────────
      #       This prevents Flet from running `flutter doctor`, which is the
      #       root cause of the "name 'unicode' is not defined" crash.
      - name: Disable Flutter Analytics
        run: |
          flutter config --no-analytics
          flutter config --no-cli-animations

      # ── 6. Install Flet ───────────────────────────────────────────────────
      - name: Install Flet
        run: |
          python -m pip install --upgrade pip
          pip install flet==0.28.3

      # ── 7. Install app dependencies ───────────────────────────────────────
      - name: Install App Dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      # ── 8. Build APK ──────────────────────────────────────────────────────
      - name: Build APK
        run: flet build apk --verbose

      # ── 9. Verify APK ─────────────────────────────────────────────────────
      - name: Verify APK exists
        run: |
          find build/apk -name "*.apk" | tee /tmp/apk_list.txt
          if [ ! -s /tmp/apk_list.txt ]; then
            echo "ERROR: No APK found!" && exit 1
          fi

      # ── 10. Upload APK ────────────────────────────────────────────────────
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FocusFlow-Mobile-App
          path: build/apk/*.apk
          retention-days: 30
          if-no-files-found: error
