name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Setup Java 17 (Required for standard Flutter/Android SDK compilation)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 2. Pre-install Flutter to completely bypass Flet's internal downloader
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Accept Android Licenses
        run: yes | flutter doctor --android-licenses || true

      # 3. Use Python 3.11 to prevent Flet's template engine from throwing the 'unicode' error
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 4. Lock requirements so the isolated Flet environment uses the stable version
      - name: Create Requirements
        run: echo "flet==0.80.3" > requirements.txt

      # 5. Install the stable Flet CLI
      - name: Install flet-cli
        run: |
          python -m pip install --upgrade pip
          pip install flet==0.80.3 flet-cli==0.80.3

      # 6. Build the APK using explicit CLI flags rather than environment variables
      - name: Build APK
        run: flet build apk --skip-flutter-doctor --no-rich-output

      # 7. Upload the compiled App file
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FocusFlow-Mobile-App
          path: build/apk/*.apk
          retention-days: 30
          if-no-files-found: error
