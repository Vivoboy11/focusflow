name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout Code
        uses: actions/checkout@v4

      # ── 2. Python 3.12 ────────────────────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ── 3. Java 17 ────────────────────────────────────────────────────────
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 4. Install Flet ───────────────────────────────────────────────────
      - name: Install Flet
        run: |
          python -m pip install --upgrade pip
          pip install flet

      # ── 5. Install app dependencies ───────────────────────────────────────
      - name: Install App Dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      # ── 6. Pre-install Flutter SDK that Flet 0.81 requires ────────────────
      #       Flet 0.81 needs Flutter 3.41.2 and prompts "Install now? [y/n]"
      #       in CI there is no terminal to answer, so we pre-install the
      #       exact version Flet expects to skip the prompt entirely.
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          channel: 'stable'
          cache: true

      - name: Disable Flutter Analytics
        run: |
          flutter config --no-analytics
          flutter config --no-cli-animations

      # ── 7. Build APK ──────────────────────────────────────────────────────
      #       echo "y" pipes "yes" to any remaining prompts
      #       FLET_CLI_NO_RICH_OUTPUT suppresses unicode crash
      - name: Build APK
        env:
          FLET_CLI_NO_RICH_OUTPUT: "1"
        run: echo "y" | flet build apk --skip-flutter-doctor --verbose

      # ── 8. Verify APK ─────────────────────────────────────────────────────
      - name: Verify APK exists
        run: |
          find build/apk -name "*.apk" | tee /tmp/apk_list.txt
          if [ ! -s /tmp/apk_list.txt ]; then
            echo "ERROR: No APK found!" && exit 1
          fi

      # ── 9. Upload APK ─────────────────────────────────────────────────────
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FocusFlow-Mobile-App
          path: build/apk/*.apk
          retention-days: 30
          if-no-files-found: error
