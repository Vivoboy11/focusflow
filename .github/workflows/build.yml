name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Flet
        run: |
          python -m pip install --upgrade pip
          pip install flet

      - name: Install App Dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Create pyproject.toml
        run: |
          if [ ! -f pyproject.toml ]; then
            printf '[project]\nname = "focusflow"\nversion = "1.0.0"\ndescription = "FocusFlow Mobile App"\ndependencies = ["flet"]\n\n[tool.flet]\norg = "com.focusflow"\nproduct = "FocusFlow"\n' > pyproject.toml
          fi

      - name: Build APK
        env:
          FLET_CLI_SKIP_FLUTTER_DOCTOR: "true"
        run: flet build apk --yes --verbose

      - name: Verify APK exists
        run: |
          find build/apk -name "*.apk" | tee /tmp/apk_list.txt
          if [ ! -s /tmp/apk_list.txt ]; then
            echo "ERROR: No APK found!" && exit 1
          fi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FocusFlow-Mobile-App
          path: build/apk/*.apk
          retention-days: 30
          if-no-files-found: error
