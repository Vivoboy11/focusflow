name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout source code ───────────────────────────────────────────
      - name: Checkout Code
        uses: actions/checkout@v4

      # ── 2. Python 3.12 ────────────────────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ── 3. Java 17 ────────────────────────────────────────────────────────
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 4. Hide pre-installed Flutter from Flet ───────────────────────────
      #       ubuntu-latest ships with Flutter already installed at
      #       /usr/local/share/flutter. Flet detects it, runs flutter doctor,
      #       and crashes with "name 'unicode' is not defined" while parsing
      #       the output. We rename the binary to hide it so Flet downloads
      #       and manages its own Flutter instead.
      - name: Hide system Flutter
        run: |
          FLUTTER_BIN=$(which flutter 2>/dev/null || true)
          if [ -n "$FLUTTER_BIN" ]; then
            sudo mv "$FLUTTER_BIN" "${FLUTTER_BIN}.bak"
            echo "Hid system Flutter at $FLUTTER_BIN"
          else
            echo "No system Flutter found, nothing to hide"
          fi

      # ── 5. Install Flet ───────────────────────────────────────────────────
      - name: Install Flet
        run: |
          python -m pip install --upgrade pip
          pip install flet==0.28.3

      # ── 6. Create minimal pyproject.toml (required by Flet build) ─────────
      #       Without this, flet build may fail finding app metadata.
      - name: Create pyproject.toml
        run: |
          if [ ! -f pyproject.toml ]; then
            cat > pyproject.toml << 'TOML'
          [project]
          name = "focusflow"
          version = "1.0.0"
          description = "FocusFlow Mobile App"
          dependencies = ["flet==0.28.3"]

          [tool.flet]
          org = "com.focusflow"
          product = "FocusFlow"
          TOML
            echo "Created pyproject.toml"
          else
            echo "pyproject.toml already exists, skipping"
          fi

      # ── 7. Build the APK ──────────────────────────────────────────────────
      - name: Build APK
        run: flet build apk --verbose

      # ── 8. Verify APK exists ──────────────────────────────────────────────
      - name: Verify APK exists
        run: |
          find build/apk -name "*.apk" | tee /tmp/apk_list.txt
          if [ ! -s /tmp/apk_list.txt ]; then
            echo "ERROR: No APK found!" && exit 1
          fi

      # ── 9. Upload APK ─────────────────────────────────────────────────────
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FocusFlow-Mobile-App
          path: build/apk/*.apk
          retention-days: 30
          if-no-files-found: error
