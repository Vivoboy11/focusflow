name: Build Android APK

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Accept Android Licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet

      # THE FIX: Tell Flet to completely skip the buggy 'flutter doctor' step!
      - name: Build APK
        run: flet build apk --skip-flutter-doctor

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FocusFlow-Mobile-App
          path: build/apk/*.apk
