name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Flet
        run: |
          python -m pip install --upgrade pip
          pip install flet

      - name: Patch Flet unicode bug
        run: |
          # Find flet_cli location using pip show (works even without importable module)
          FLET_CLI_PATH=$(pip show flet-cli 2>/dev/null | grep Location | awk '{print $2}')
          echo "flet-cli location: $FLET_CLI_PATH"

          if [ -n "$FLET_CLI_PATH" ]; then
            echo "Patching unicode -> str in flet_cli..."
            find "$FLET_CLI_PATH/flet_cli" -name "*.py" | xargs grep -l "unicode(" 2>/dev/null | while read f; do
              echo "  Patching: $f"
              sed -i 's/unicode(/str(/g' "$f"
            done
            echo "Patch complete"
          else
            echo "WARNING: flet-cli not found via pip show, trying fallback..."
            find $(python -c "import sys; print(' '.join(sys.path))") -path "*/flet_cli/*.py" 2>/dev/null | xargs grep -l "unicode(" 2>/dev/null | while read f; do
              echo "  Patching: $f"
              sed -i 's/unicode(/str(/g' "$f"
            done
          fi

      - name: Install App Dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Create pyproject.toml
        run: |
          if [ ! -f pyproject.toml ]; then
            printf '[project]\nname = "focusflow"\nversion = "1.0.0"\ndescription = "FocusFlow Mobile App"\ndependencies = ["flet"]\n\n[tool.flet]\norg = "com.focusflow"\nproduct = "FocusFlow"\n' > pyproject.toml
          fi

      - name: Build APK
        env:
          FLET_CLI_SKIP_FLUTTER_DOCTOR: "true"
        run: flet build apk --yes --verbose

      - name: Verify APK exists
        run: |
          find build/apk -name "*.apk" | tee /tmp/apk_list.txt
          if [ ! -s /tmp/apk_list.txt ]; then
            echo "ERROR: No APK found!" && exit 1
          fi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FocusFlow-Mobile-App
          path: build/apk/*.apk
          retention-days: 30
          if-no-files-found: error
