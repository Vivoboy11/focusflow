name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  FLET_CLI_VERSION: "0.81.0"
  BUILD_NUMBER: 1
  BUILD_VERSION: 1.0.0
  PYTHONUTF8: "1"
  FLET_CLI_NO_RICH_OUTPUT: "1"
  FLET_CLI_SKIP_FLUTTER_DOCTOR: "1"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install flet-cli
        run: |
          python -m pip install --upgrade pip
          pip install flet-cli==${{ env.FLET_CLI_VERSION }}

      - name: Patch unicode bug in flet-cli only
        run: |
          # Get path to flet_cli package ONLY - do not touch any other packages
          FLET_CLI_DIR=$(python -c "import flet_cli, os; print(os.path.dirname(flet_cli.__file__))")
          echo "Patching only: $FLET_CLI_DIR"

          # Show files that contain unicode( before patching
          grep -rl --include="*.py" "unicode(" "$FLET_CLI_DIR" 2>/dev/null

          # Patch unicode(x, enc) -> x.decode(enc) if isinstance(x, bytes) else str(x)
          find "$FLET_CLI_DIR" -name "*.py" | while read f; do
            if grep -q "unicode(" "$f" 2>/dev/null; then
              echo "Patching: $f"
              python3 - "$f" << 'PYEOF'
          import re, sys
          path = sys.argv[1]
          with open(path, 'r', encoding='utf-8') as fh:
              src = fh.read()
          # unicode(x, enc) -> (x).decode(enc) if isinstance((x), bytes) else str((x))
          src = re.sub(
              r'unicode\(([^,)]+),\s*([^)]+)\)',
              r'((\1).decode(\2) if isinstance((\1), bytes) else str(\1))',
              src
          )
          # unicode(x) -> str(x)
          src = re.sub(r'unicode\(([^)]+)\)', r'str(\1)', src)
          with open(path, 'w', encoding='utf-8') as fh:
              fh.write(src)
          print(f"Patched: {path}")
          PYEOF
            fi
          done
          echo "Patch complete"

      - name: Accept Android licenses
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install App Dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Create pyproject.toml
        run: |
          if [ ! -f pyproject.toml ]; then
            printf '[project]\nname = "focusflow"\nversion = "%s"\ndescription = "FocusFlow Mobile App"\ndependencies = ["flet"]\n\n[tool.flet]\norg = "com.focusflow"\nproduct = "FocusFlow"\n' "${{ env.BUILD_VERSION }}" > pyproject.toml
          fi

      - name: Build APK
        run: |
          flet build apk \
            --build-number ${{ env.BUILD_NUMBER }} \
            --build-version ${{ env.BUILD_VERSION }} \
            --yes \
            --verbose

      - name: Verify APK exists
        run: |
          find build/apk -name "*.apk" | tee /tmp/apk_list.txt
          if [ ! -s /tmp/apk_list.txt ]; then
            echo "ERROR: No APK found!" && exit 1
          fi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FocusFlow-Mobile-App
          path: build/apk/*.apk
          retention-days: 30
          if-no-files-found: error
