name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout source code ───────────────────────────────────────────
      - name: Checkout Code
        uses: actions/checkout@v4

      # ── 2. Python 3.12 ────────────────────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ── 3. Java 17 (as per official Flet Android docs) ────────────────────
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 4. Install Flet ───────────────────────────────────────────────────
      #       NOTE: Do NOT pre-install Flutter via subosito/flutter-action.
      #       Flet downloads and manages its own Flutter version internally.
      #       Pre-installing Flutter causes the 'unicode is not defined' crash
      #       when Flet tries to parse the output of the system Flutter binary.
      - name: Install Flet
        run: |
          python -m pip install --upgrade pip
          pip install flet==0.28.3

      # ── 5. Install app dependencies (if requirements.txt exists) ──────────
      - name: Install App Dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      # ── 6. Build the APK ──────────────────────────────────────────────────
      #       Flet will auto-download Flutter, install Android SDK,
      #       accept licenses, and compile — all automatically.
      - name: Build APK
        run: flet build apk --verbose

      # ── 7. Verify APK exists ──────────────────────────────────────────────
      - name: Verify APK exists
        run: |
          find build/apk -name "*.apk" | tee /tmp/apk_list.txt
          if [ ! -s /tmp/apk_list.txt ]; then
            echo "ERROR: No APK found!" && exit 1
          fi

      # ── 8. Upload APK ─────────────────────────────────────────────────────
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FocusFlow-Mobile-App
          path: build/apk/*.apk
          retention-days: 30
          if-no-files-found: error
