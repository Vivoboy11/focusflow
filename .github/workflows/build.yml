name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Accept Android Licenses
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 1. Lock the internal app compiler to 0.80.3
      - name: Lock App Requirements
        run: echo "flet==0.80.3" > requirements.txt

      # 2. Lock the cloud server to 0.80.3 (THIS WAS MISSING BEFORE!)
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet==0.80.3 flet-cli==0.80.3

      # 3. Build the APK smoothly
      - name: Build APK
        env:
          _JAVA_OPTIONS: "-Xmx3200m"
        run: flet build apk --skip-flutter-doctor --no-rich-output --yes

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FocusFlow-Mobile-App
          path: build/apk/*.apk
          retention-days: 30
          if-no-files-found: error
