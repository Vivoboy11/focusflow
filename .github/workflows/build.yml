name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Setup Java 17
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 2. Accept Android Licenses (Using native Android SDK tool)
      - name: Accept Android Licenses
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

      # 3. Use Python 3.11
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 4. Lock requirements
      - name: Create Requirements
        run: echo "flet==0.80.3" > requirements.txt

      # 5. Install the stable Flet CLI
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet==0.80.3 flet-cli==0.80.3

      # 6. Build the APK (ADDED --yes TO AUTO-ACCEPT ALL PROMPTS!)
      - name: Build APK
        run: flet build apk --skip-flutter-doctor --no-rich-output --yes

      # 7. Upload the compiled App file
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FocusFlow-Mobile-App
          path: build/apk/*.apk
          retention-days: 30
          if-no-files-found: error
