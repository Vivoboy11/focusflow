name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      NO_COLOR: "1"          # Disables Flet's rich color renderer → fixes "name 'unicode' is not defined"
      PUB_ENVIRONMENT: "bot"  # Suppresses pub interactive prompts

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout Code
        uses: actions/checkout@v4

      # ── 2. Python 3.12 ────────────────────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ── 3. Java 17 (safe default for Android SDK 36) ──────────────────────
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 4. Flutter (unpinned — use whatever stable runner has) ────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # ── 5. Disable Flutter analytics ──────────────────────────────────────
      - name: Configure Flutter
        run: |
          flutter config --no-analytics
          flutter config --no-cli-animations

      # ── 6. Accept Android licenses ────────────────────────────────────────
      - name: Accept Android Licenses
        run: |
          yes | flutter doctor --android-licenses || true
          yes | sdkmanager --licenses || true

      # ── 7. Cache Pub & Gradle ─────────────────────────────────────────────
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-deps-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: ${{ runner.os }}-deps-

      # ── 8. Install Flet ───────────────────────────────────────────────────
      - name: Install Flet
        run: |
          python -m pip install --upgrade pip
          pip install flet==0.28.3

      # ── 9. Install app dependencies ───────────────────────────────────────
      - name: Install App Dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      # ── 10. Build APK ─────────────────────────────────────────────────────
      - name: Build APK
        run: flet build apk --verbose
        env:
          NO_COLOR: "1"

      # ── 11. Verify APK ────────────────────────────────────────────────────
      - name: Verify APK exists
        run: |
          find build/apk -name "*.apk" | tee /tmp/apk_list.txt
          [ -s /tmp/apk_list.txt ] || (echo "ERROR: No APK found!" && exit 1)

      # ── 12. Upload Artifact ───────────────────────────────────────────────
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FocusFlow-Mobile-App
          path: build/apk/*.apk
          retention-days: 30
          if-no-files-found: error
