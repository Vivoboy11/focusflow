name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # THE GOD-MODE FIX: A custom function that perfectly safely absorbs Flet's broken 'None' variables
      - name: Patch Python Unicode Bug Globally
        run: |
          cat << 'EOF' > sitecustomize.py
          import builtins
          def legacy_unicode(data='', encoding='utf-8', errors='strict'):
              if encoding is None:
                  encoding = 'utf-8'
              if isinstance(data, bytes):
                  return data.decode(encoding, errors)
              return str(data)
          builtins.unicode = legacy_unicode
          EOF
          echo "PYTHONPATH=$PWD" >> $GITHUB_ENV

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet==0.80.3 flet-cli==0.80.3

      - name: Build APK
        env:
          _JAVA_OPTIONS: "-Xmx3200m"
        run: flet build apk --skip-flutter-doctor --no-rich-output --yes

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FocusFlow-Mobile-App
          path: build/apk/*.apk
          retention-days: 30
          if-no-files-found: error
